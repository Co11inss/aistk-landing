<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to AISTK Pro</title>
<style>
  :root {
    --bg: #06050a;
    --card: #13102b;
    --border: #1e1845;
    --accent: #7c3aed;
    --accent-glow: #a78bfa;
    --green: #34d399;
    --text: #e8e4f0;
    --text-dim: #8b85a8;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    margin: 24px;
  }
  .check { font-size: 56px; margin-bottom: 20px; display: block; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
  p { color: var(--text-dim); font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
  .terminal {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--green);
    margin-bottom: 24px;
  }
  .btn {
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    transition: background 0.2s;
  }
  .btn:hover { background: #6d28d9; }
</style>
</head>
<body>
<div class="card">
  <span class="check">✅</span>
  <h1>You're in.</h1>
  <p>Welcome to AISTK Pro. You'll start receiving the full edition tomorrow morning — deep dives, paper analysis, and early access.</p>
  <div class="terminal">$ ./aistk --status<br>plan: pro &nbsp;|&nbsp; status: active</div>
  <a href="https://buttondown.com/aistack" class="btn">Read the archive →</a>
</div>
</body>
</html>
