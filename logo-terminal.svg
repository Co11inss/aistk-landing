<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="aistk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="40%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="cursor-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Prompt symbol -->
  <text x="20" y="72" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="42" font-weight="700" fill="#34d399">$</text>

  <!-- AISTK wordmark -->
  <text x="52" y="72" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="42" font-weight="700" fill="url(#aistk-grad)" letter-spacing="-1">aistk</text>

  <!-- Blinking cursor -->
  <rect x="182" y="32" width="3" height="36" rx="1.5" fill="url(#cursor-grad)">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
